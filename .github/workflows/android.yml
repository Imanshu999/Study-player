Name: Build Signed Android Release APK 🚀

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  _JAVA_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Djava.awt.headless=true"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.jvmargs=-Xmx4g -Djava.awt.headless=true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Create .env and placeholder files 🔑
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=\"dummy_key_for_build_purposes\"" > .env
          else
            echo "GEMINI_API_KEY=\"${{ secrets.GEMINI_API_KEY }}\"" > .env
          fi
          echo "GEMINI_API_KEY=placeholder" > .env.example
          echo "YOUTUBE_API_KEY=placeholder" >> .env.example

      - name: Generate Gradle Wrapper 🛠️
        run: |
          gradle wrapper --gradle-version 9.3.1 --no-daemon
          chmod +x gradlew

      - name: Setup Gradle 🚀
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Generate Release Keystore File 🔑
        run: |
          keytool -genkey -v -keystore app/keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -keyalg RSA -keysize 2048 -validity 100000 \
            -dname "CN=Takano3D,O=Takano3D,C=IN"

      - name: Build Signed Release APK 📦
        env:
          KEYSTORE_PATH: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: study-player-release-apk
          path: app/build/outputs/apk/release/app-release.apk


